<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Uncanny Garden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #fff;
    }

    canvas { display: block; }

    /* ── OVERLAY ── */
    #overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── INTRO SCREEN ── */
    #intro {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: radial-gradient(ellipse at center, #0d0d1a 0%, #000 100%);
      pointer-events: all;
    }

    .garden-title {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
    }

    .garden-subtitle {
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    .elements-row {
      display: flex;
      gap: 1.5rem;
      margin: 0.5rem 0;
    }

    .el-pip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.4);
    }

    .el-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    #ar-button {
      margin-top: 1rem;
      padding: 0.9rem 2.5rem;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      pointer-events: all;
      transition: border-color 0.3s, color 0.3s;
    }

    #ar-button:hover { border-color: #00e5ff; color: #00e5ff; }

    #ios-notice {
      max-width: 280px;
      text-align: center;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.3);
      line-height: 1.7;
      letter-spacing: 0.05em;
    }

    /* ── AR HUD ── */
    #hud {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
    }

    #hint-text {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
    }

    /* ── ELEMENT LABEL ── */
    #element-label {
      position: absolute;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      opacity: 0;
      transition: opacity 0.5s;
    }

    #element-label.visible { opacity: 1; }

    #element-name {
      font-size: 1.2rem;
      letter-spacing: 0.3em;
      color: #fff;
    }

    #element-desc {
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.45);
      margin-top: 0.2rem;
    }

    /* ── COMPASS (GPS mode placeholder) ── */
    #compass {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      width: 60px;
      height: 60px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 0.5rem;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>

<div id="overlay">

  <!-- INTRO -->
  <div id="intro">
    <div class="garden-title">Uncanny<br>Garden</div>
    <div class="garden-subtitle">五行 · AR Installation</div>

    <button id="ar-button">Enter Garden</button>
    <div id="ios-notice"></div>
  </div>

  <!-- AR HUD (shown after AR starts) -->
  <div id="hud" style="display:none">
    <div id="hint-text">Scanning surface…</div>
  </div>

  <div id="element-label">
    <div id="element-name"></div>
    <div id="element-desc"></div>
  </div>

  <div id="compass">N</div>

</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
